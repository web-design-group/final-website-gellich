<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style_profile.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="nav">
        <a href="index.html" class="logo-link">
          <img class="logo" src="css/imgs/profile/logo.png" alt="logo">
        </a>
        
        <nav class="menu">
          <a href="#">Вопросы</a>
          <a href="price.html">Прайс</a>
          <a href="#">Мастера</a>
          <a href="index.html">О нас</a>
        </nav>
        
        <a href="profil.html" class="login-link">
          <span>Войти</span>
          <img src="css/imgs/profile/icon_profile.png" alt="Войти" class="login-icon">
        </a>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="profile-page">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
          
          <div class="profile-content">
            <div class="text-center">
              <div class="title-box d-inline-block">
                <h1>Профиль</h1>
              </div>
            </div>

            <div class="profile-image-wrap text-center">
              <img src="css/imgs/profile/img.png" alt="Профиль" class="profile-image">
            </div>

            <form class="profile-form" id="profileForm">
              <div class="form-group">
                <label for="fullName">ФИО</label>
                <input type="text" id="fullName" name="fullName" placeholder="">
                <small class="error-message d-block"></small>
              </div>

              <div class="form-group">
                <label for="email">ЭЛЕКТРОННАЯ ПОЧТА</label>
                <input type="email" id="email" name="email" placeholder="">
                <small class="error-message d-block"></small>
              </div>

              <div class="form-group">
                <label for="birthDate">ДАТА РОЖДЕНИЯ</label>
                <input type="date" id="birthDate" name="birthDate">
                <small class="error-message d-block"></small>
              </div>

              <div class="form-group">
                <label for="phone">ТЕЛЕФОН</label>
                <input type="tel" id="phone" name="phone" placeholder="">
                <small class="error-message d-block"></small>
              </div>

              <div class="text-center">
                <button type="submit" class="save-btn">ЗАПИСАТЬСЯ</button>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content d-flex justify-content-between align-items-start flex-wrap">
        <div class="contacts">
          <h3>КОНТАКТЫ</h3>
          <div class="contact-item">
            <img src="css/imgs/profile/tel.png" alt="Телефон" class="contact-icon">
            <p>+79112399647</p>
          </div>
          <div class="contact-item">
            <img src="css/imgs/profile/mail.png" alt="Email" class="contact-icon">
            <p>@nails.spb@gmail.com</p>
          </div>
        </div>

        <div class="socials-vertical">
          <a href="#" class="social-link">
            <img src="css/imgs/profile/inst.png" alt="IG" class="social-icon">
          </a>
          <a href="#" class="social-link">
            <img src="css/imgs/profile/vk.png" alt="VK" class="social-icon">
          </a>
          <a href="#" class="social-link">
            <img src="css/imgs/profile/tg.png" alt="TG" class="social-icon">
          </a>
        </div>
      </div>
    </div>
  </footer>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Custom JS -->
  <script src="js/js.js"></script>
</body>
</html>
