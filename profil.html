  <link rel="stylesheet" href="css/style_profile.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
  <div class="container nav">
    <img class="logo" src="css/imgs/profile/logo.png" alt="logo">
    
    <nav class="menu">

    <a href="profil.html" class="login">Войти</a>
    <button class="burger">☰</button>
  </div>
</header>

  <!-- MAIN -->
  <main class="profile-page">
    <section class="profile-section">

      <div class="title-box">
        <h1>Профиль</h1>
      </div>

      <div class="profile-image-wrap">
        <img src="css/imgs/profile/img.png" alt="Профиль" class="profile-image">
      </div>

      <form class="profile-form" id="profileForm">
        <div class="form-group">
          <label for="fullName">ФИО</label>
          <input type="text" id="fullName" name="fullName" placeholder="">
          <small class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="email">ЭЛЕКТРОННАЯ ПОЧТА</label>
          <input type="email" id="email" name="email" placeholder="">
          <small class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="birthDate">ДАТА РОЖДЕНИЯ</label>
          <input type="date" id="birthDate" name="birthDate">
          <small class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="phone">ТЕЛЕФОН</label>
          <input type="tel" id="phone" name="phone" placeholder="">
          <small class="error-message"></small>
        </div>

        <button type="submit" class="save-btn">ЗАПИСАТЬСЯ</button>
      </form>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">
      <div class="contacts">
        <h3>КОНТАКТЫ</h3>

        <p> @nails.spb@gmail.com</p>
      </div>

      <div class="socials">
    <a href="#">IG</a>
    <a href="#">VK</a>
    <a href="#">TG</a>
  </div>
    </div>
  </footer>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/js.js"></script>
</body>
</html>
